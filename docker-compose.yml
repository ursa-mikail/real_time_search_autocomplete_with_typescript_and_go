services:
  postgres:
    image: postgres:16-alpine
    container_name: searchpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: searchpulse
      POSTGRES_PASSWORD: searchpulse
      POSTGRES_DB: searchpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchpulse -d searchpulse"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: searchpulse-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://searchpulse:searchpulse@postgres:5432/searchpulse?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: searchpulse-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
